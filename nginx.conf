server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # база тестов — без кэша, чтобы подмена файлов подхватывалась сразу
  location /tests/ {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }
}
